<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TeamSpeak 频道管理 - Alec-Apuの主页</title>

    <!-- jQuery -->
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.0/css/bootstrap.min.css">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.1.2/css/all.min.css">

    <!-- iziToast -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/izitoast/1.4.0/css/iziToast.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>

    <!-- 主页共通样式 -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <link rel="stylesheet" href="../css/animation.css">

    <!-- TeamSpeak 页面专属样式 -->
    <link rel="stylesheet" href="./css/ts-channel.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-custom sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="../index.html">
                <i class="fa-solid fa-arrow-left"></i> 返回主页
            </a>
        </div>
    </nav>

    <div class="container container-custom">
        <!-- 标题 -->
        <div class="text-center mb-4" style="color: white;">
            <h1 style="font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem;">
                <i class="fa-solid fa-headphones"></i> TeamSpeak 频道管理
            </h1>
            <p style="font-size: 1.1rem; opacity: 0.9;">自助创建和管理你的私人语音频道</p>
        </div>

        <!-- 提示区 -->
        <div id="alert-container"></div>

        <!-- 创建频道卡片 -->
        <div class="card card-custom">
            <div class="card-header card-header-custom">
                <h5 class="mb-0">
                    <i class="fa-solid fa-plus-circle"></i> 创建新频道
                </h5>
            </div>
            <div class="card-body" style="padding: 2rem;">
                <form id="createChannelForm">
                    <div class="form-group form-group-custom">
                        <label for="channelName" class="form-label">频道名称</label>
                        <input type="text" class="form-control" id="channelName" placeholder="输入你的频道名称" required>
                        <small class="text-muted">最多 40 个字符</small>
                    </div>

                    <div class="form-group form-group-custom">
                        <label for="password" class="form-label">频道密码（可选）</label>
                        <input type="password" class="form-control" id="password" placeholder="留空表示无需密码">
                        <small class="text-muted">保护你的私人频道</small>
                    </div>

                    <div class="form-group form-group-custom">
                        <label for="maxUsers" class="form-label">最大用户数</label>
                        <input type="number" class="form-control" id="maxUsers" value="10" min="1" max="100" required>
                    </div>

                    <div class="form-group form-group-custom">
                        <label for="description" class="form-label">频道描述（可选）</label>
                        <textarea class="form-control" id="description" rows="3" placeholder="添加频道描述..."></textarea>
                    </div>

                    <div id="loadingSpinner" class="loading-spinner">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">创建中...</span>
                        </div>
                        <p class="mt-2">正在创建频道...</p>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100" id="submitBtn">
                        <i class="fa-solid fa-check"></i> 创建频道
                    </button>
                </form>
            </div>
        </div>

        <!-- 我的频道卡片 -->
        <div class="card card-custom">
            <div class="card-header card-header-custom">
                <h5 class="mb-0">
                    <i class="fa-solid fa-list"></i> 我的频道
                </h5>
            </div>
            <div class="card-body" style="padding: 2rem;">
                <div id="myChannelsContainer">
                    <div class="text-center text-muted py-5">
                        <i class="fa-solid fa-inbox" style="font-size: 2rem; margin-bottom: 1rem; display: block;"></i>
                        <p>暂无频道，<a href="#" onclick="document.getElementById('createChannelForm').scrollIntoView(true);">立即创建一个</a></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 说明卡片 -->
        <div class="card card-custom">
            <div class="card-header card-header-custom">
                <h5 class="mb-0">
                    <i class="fa-solid fa-info-circle"></i> 使用说明
                </h5>
            </div>
            <div class="card-body" style="padding: 2rem;">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <h6 class="mb-2"><i class="fa-solid fa-download"></i> 第一步：下载 TeamSpeak</h6>
                        <p class="text-muted">访问 <a href="https://teamspeak.com" target="_blank">teamspeak.com</a> 下载官方客户端</p>
                    </div>
                    <div class="col-md-6 mb-3">
                        <h6 class="mb-2"><i class="fa-solid fa-plug"></i> 第二步：连接到服务器</h6>
                        <p class="text-muted">服务器地址：<code>alecapu.top</code></p>
                    </div>
                    <div class="col-md-6 mb-3">
                        <h6 class="mb-2"><i class="fa-solid fa-wand-magic-sparkles"></i> 第三步：创建频道</h6>
                        <p class="text-muted">使用上面的表格创建你的私人频道</p>
                    </div>
                    <div class="col-md-6 mb-3">
                        <h6 class="mb-2"><i class="fa-solid fa-users"></i> 第四步：邀请朋友</h6>
                        <p class="text-muted">分享频道名称和密码给你的朋友</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页脚 -->
        <div class="text-center mb-5" style="color: white; margin-top: 3rem;">
            <p style="opacity: 0.8;">
                如有问题，请通过主页联系我
            </p>
        </div>
    </div>

    <!-- 引入 TeamSpeak 前端脚本 -->
    <script src="./js/ts-channel.js"></script>
</body>
</html>
